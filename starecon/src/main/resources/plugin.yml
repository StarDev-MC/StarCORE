name: StarEcon
main: net.starcore.starecon.StarEconPlugin
version: 1.0.0
api-version: 1.26
description: "StarCore economy plugin with async balance management and pay support."
softdepend: [StarCore]
commands:
  balance:
    description: View your wallet balance.
    usage: /balance
  pay:
    description: Pay a player.
    usage: /pay <player> <amount>
  balancetop:
    description: Display top balances.
    usage: /balancetop
